# Hospeda o build do Vite no GitHub Pages.
# - VITE_API_URL: segredo/variável do repositório OU variável num GitHub "Environment"
#   Se VITE estiver noutro ambiente que não "github-pages", defina a variável de repositório
#   GHA_VITE_GITHUB_ENV = nome_desse_ambiente (ex.: equivoz).
# - CORS no Heroku: https://<usuario>.github.io
name: Deploy GitHub Pages (front-end)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-github-pages.yml"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # `vars`/`secrets` de VITE_API_URL dependem do Environment. Por defeito usamos o ambiente
    # "github-pages". Se tiveres VITE só noutro ambiente (ex. "equivoz"), defina a variável de
    # repositório GHA_VITE_GITHUB_ENV com esse nome (a variável tem de existir a nível de repositório).
    environment:
      name: ${{ vars.GHA_VITE_GITHUB_ENV || 'github-pages' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verificar VITE_API_URL
        env:
          VITE_CHECK: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
        run: |
          if [ -z "${VITE_CHECK:-}" ] || [ "${VITE_CHECK}" = "" ]; then
            echo '::error::Defina VITE_API_URL: Settings → Actions → (segredo ou variável do repositório) com a URL do Heroku, ou crie a variável no teu ambiente. Se o VITE estiver num ambiente (ex. equivoz) e não for "github-pages", cria a variável de repositório GHA_VITE_GITHUB_ENV = nome_esse_ambiente. URL sem / no fim.' 
            exit 1
          fi

      - name: Instalar e build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - name: Publicar
        id: d
        uses: actions/deploy-pages@v4
