# Hospeda o build do Vite no GitHub Pages.
# - VITE_API_URL: no segredo/variáveis *do repositório* ou numa env (equivoz, etc.).
# - GHA_VITE_GITHUB_ENV: SÓ como variável de *repositório* (aba Variables → Repository
#   variables), nunca “dentro” de um Environment — o workflow precisa do nome da env
#   antes de a puder carregar (não podes pôr este nome na própria env).
#   Valor: ex. equivoz (igual ao nome do teu ambiente se VITE for só aí).
# - CORS no Heroku: https://<usuario>.github.io
name: Deploy GitHub Pages (front-end)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-github-pages.yml"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # `environment: name: ${{ vars.GHA_VITE_GITHUB_ENV }}` só lê *Repository* variables; env vars
    # (mesmo de "equivoz") vêm depois. Se GHA_VITE_GITHUB_ENV estiver só *dentro* de equivoz, fica
    # vazio → cai em github-pages e perde o VITE.
    environment:
      name: ${{ vars.GHA_VITE_GITHUB_ENV || 'github-pages' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verificar VITE_API_URL
        env:
          VITE_CHECK: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
        run: |
          if [ -z "${VITE_CHECK:-}" ] || [ "${VITE_CHECK}" = "" ]; then
            echo '::error::VITE_API_URL vazio neste build. (1) Mete a URL do Heroku (sem / no fim) em *Repository* variables/Secrets OU no teu ambiente, e (2) se usas o ambiente "equivoz", GHA_VITE_GITHUB_ENV tem de estar em *Repository* variables = equivoz, não na secção "Environment" desse ambiente; ou duplica VITE_API_URL a nível de repositório.'
            exit 1
          fi

      - name: Instalar e build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - name: Publicar
        id: d
        uses: actions/deploy-pages@v4
