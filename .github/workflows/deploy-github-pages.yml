# Hospeda o build do Vite no GitHub Pages.
# - VITE_API_URL: segredo/variável *do repositório* ou variável num Environment (ex. equivoz).
# - Nome do Environment do job: vars ou secrets *do repositório* GHA_VITE_GITHUB_ENV = p.ex. equivoz
#   (não confundir com a URL do Heroku). Segredos não aparecem em `vars` — o workflow lê
#   vars.GHA_VITE_GITHUB_ENV || secrets.GHA_VITE_GITHUB_ENV.
# - CORS no Heroku: https://<usuario>.github.io
name: Deploy GitHub Pages (front-end)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-github-pages.yml"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Nome do Environment (o valor tem de ser repo var/secret, não a variável “dentro” de equivoz).
    environment:
      name: ${{ vars.GHA_VITE_GITHUB_ENV || secrets.GHA_VITE_GITHUB_ENV || 'github-pages' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verificar VITE_API_URL
        env:
          VITE_CHECK: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
        run: |
          if [ -z "${VITE_CHECK:-}" ] || [ "${VITE_CHECK}" = "" ]; then
            echo '::error::VITE_API_URL vazio. (1) URL do Heroku em *Repository* ou no Environment escolhido. (2) GHA_VITE_GITHUB_ENV (só o nome, ex. equivoz) em *Repository* **Variables** ou **Secrets** — nunca só dentro do Environment; o valor do segredo/variável tem de ser a palavra equivoz, não a URL.'
            exit 1
          fi

      - name: Instalar e build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - name: Publicar
        id: d
        uses: actions/deploy-pages@v4
