spring.application.name=equivoz-api
server.port=8001

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.datasource.url=jdbc:sqlite:spring-equivoz.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

equivoz.jwt.secret=${JWT_SECRET:change-me-in-production-use-env-var-min-32b!}
equivoz.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
