# Monorepo: a app Vite fica em frontend/ — sem isto o Netlify usa a raiz e o site fica sem index.html.
[build]
  base = "frontend"
  command = "npm ci && npm run build"
  # Relativo à pasta `base` (não use `frontend/dist` — o Netlify acumula e vira `frontend/frontend/dist`).
  publish = "dist"

# React Router: qualquer rota (ex. /login) devolve o index.html; sem isto o Netlify mostra 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
